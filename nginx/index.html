<!DOCTYPE html>
<html>
<head>
    <title>DevOps Task</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>Hello DevOps world!</h1>
    <p>Server Time: <span id="time">Loading...</span></p>
    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleString();
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
